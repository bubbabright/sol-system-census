# Netlify config for Sol System Census
# Static site — no build step.

[build]
  publish = "."

# Long cache for fingerprinted-style assets (we don't fingerprint,
# so use a shorter cache for the source files and rely on Wikimedia's
# own caching for the body images).
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/*.jsx"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
    Content-Type = "text/babel; charset=utf-8"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "no-referrer-when-downgrade"

# Pretty URLs — let /census resolve to /index.html
[[redirects]]
  from = "/census"
  to = "/index.html"
  status = 200
